name: 编译openwrt固件

on:
  schedule:
    - cron: '0 0 * * 5'
  workflow_dispatch:

jobs:
  job1:
    runs-on: ubuntu-latest

    steps:
      - name: 同步更新软件源
        uses: actions/checkout@v4

      - name: Run a script
        run: echo "This is job1"

      - name: 清理磁盘空间
        uses: easimon/maximize-build-space@master
        with: 
          root-reserve-mb: 2048
          swap-size-mb: 1
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Configure Git
        run: |
          git config --global user.name "zjt37"
          git config --global user.email "27096491@qq.com"

      - name: Clone target repository
        run: |
          git clone https://${{ secrets.SOURCE_REPO_TOKEN }}@github.com/zjt37/packages.git
          cd packages
          git checkout main

      - name: Copy folder from source to target
        run: |
          git clone https://github.com/vernesong/OpenClash.git
          git clone https://github.com/Openwrt-Passwall/openwrt-passwall.git
          git clone https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git
          cp -r ./OpenClash/luci-app-openclash ./packages/
          cp -r ./openwrt-passwall/luci-app-passwall ./packages/
          rm -rf ./packages/openwrt-passwall-packages
          cp -r ./openwrt-passwall-packages ./packages/
          rm -rf ./packages/openwrt-passwall-packages/.git
          mkdir -p ./packages/luci-app-openclash/root/etc/openclash/core
          wget -O ./packages/luci-app-openclash/root/etc/openclash/core/clash_meta.tar.gz https://raw.githubusercontent.com/vernesong/OpenClash/core/master/meta/clash-linux-amd64-v2.tar.gz
          tar -xzf ./packages/luci-app-openclash/root/etc/openclash/core/clash_meta.tar.gz -C ./packages/luci-app-openclash/root/etc/openclash/core/
          mv ./packages/luci-app-openclash/root/etc/openclash/core/clash ./packages/luci-app-openclash/root/etc/openclash/core/clash_meta
          rm -f ./packages/luci-app-openclash/root/etc/openclash/core/clash_meta.tar.gz
          chmod +x ./packages/luci-app-openclash/root/etc/openclash/core/clash_meta

      - name: Commit and push changes to target repository
        run: |
          cd packages
          git add .
          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit"
          else
            git commit -m "Sync folder from source repository"
            git push origin main
          fi

  job2:
    runs-on: ubuntu-22.04
    needs: job1

    steps:
      - name: 准备开始
        uses: actions/checkout@v4

      - name: Run another script
        run: echo "This is job2, running after job1"

      - name: 清理磁盘空间
        uses: easimon/maximize-build-space@master
        with: 
          root-reserve-mb: 4096
          swap-size-mb: 1
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: 额外清理
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet /usr/local/graalvm /usr/local/.ghcup
          sudo rm -rf /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules
          sudo rm -rf /var/cache/apt/archives/* /var/lib/apt/lists/*
          df -h /

      - name: 安装系统依赖
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gettext genisoimage \
          gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev \
          libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libnsl-dev \
          libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz \
          nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools \
          qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip \
          vim wget xmlto xxd zlib1g-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo rm -rf /var/lib/apt/lists/* /var/cache/apt/archives/*
          sudo -E timedatectl set-timezone "Asia/Shanghai"
      
      - name: 下载固件源码
        working-directory: ./
        run: |
          git clone https://github.com/coolsnowwolf/lede

      - name: 更新和安装软件包
        run: |
          cd lede
          rm -f ./feeds.conf.default
          touch ./feeds.conf.default
          echo "src-git packages https://github.com/coolsnowwolf/packages" >> "feeds.conf.default"
          echo "src-git luci https://github.com/coolsnowwolf/luci.git;master" >> "feeds.conf.default"
          echo "src-git routing https://github.com/coolsnowwolf/routing" >> "feeds.conf.default"
          echo "src-git telephony https://github.com/openwrt/telephony.git" >> "feeds.conf.default"
          echo "src-git zheng https://github.com/zjt37/packages.git;main" >> "feeds.conf.default"
          echo "src-git helloworld https://github.com/fw876/helloworld.git" >> "feeds.conf.default"
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install -a

      - name: 常用配置修改
        run: |
          cd lede
          sed -i 's/192.168.1.1/192.168.2.3/g' package/base-files/luci/bin/config_generate
          sed -i "s/hostname='.*'/hostname='openwrt'/g" package/base-files/luci/bin/config_generate 
          sed -i 's/KERNEL_PATCHVER:=6.6/KERNEL_PATCHVER:=6.12/g' ./target/linux/x86/Makefile
          sed -i 's/os.date()/os.date("%Y-%m-%d %H:%M:%S")/g' package/lean/autocore/files/*/index.htm
          sed -i 's/${g}.*/${a}${b}${c}${d}${e}${f}${hydrid}/g' package/lean/autocore/files/x86/autocore
          sed -i 's/ShadowSocksR Plus+/SSR Plus+/g' package/feeds/helloworld/luci-app-ssr-plus/luasrc/controller/shadowsocksr.lua
          sed -i 's/+luci-theme-bootstrap/+luci-theme-atmaterial/g' feeds/luci/collections/luci/Makefile

